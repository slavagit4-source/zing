<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Zing — Мессенджер</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0c10;
            color: #e4e6eb;
            height: 100vh;
            overflow: hidden;
        }

        /* ==================== ПК ВЕРСИЯ (две панели) ==================== */
        .pc-layout {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Левая панель - контакты */
        .contacts-sidebar {
            width: 380px;
            background: #111214;
            border-right: 1px solid #2d2f34;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Правая панель - чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0c10;
            min-width: 0;
        }

        /* ==================== МОБИЛЬНАЯ ВЕРСИЯ ==================== */
        @media (max-width: 768px) {
            .contacts-sidebar {
                position: fixed;
                left: -380px;
                top: 0;
                bottom: 0;
                z-index: 100;
                width: 85%;
                max-width: 320px;
                transition: left 0.3s ease;
            }
            .contacts-sidebar.open {
                left: 0;
            }
            .mobile-menu-btn {
                display: block;
            }
            .mobile-only-back {
                display: block;
            }
        }

        .mobile-menu-btn {
            display: none;
            background: #2c2f36;
            border: none;
            color: white;
            font-size: 22px;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 10px;
        }

        .mobile-only-back {
            display: none;
        }

        /* ==================== ОБЩИЕ СТИЛИ ==================== */
        .header {
            background: #1e1f22;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d2f34;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5865f2, #8b9aff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
        }

        .user-id-text {
            font-size: 11px;
            color: #8e9297;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .small-btn {
            background: #2c2f36;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .small-btn:hover {
            opacity: 0.8;
        }

        /* Поиск */
        .search-section {
            background: #111214;
            padding: 12px;
            border-bottom: 1px solid #2d2f34;
            flex-shrink: 0;
        }

        .search-row {
            display: flex;
            gap: 8px;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 24px;
            border: 1px solid #2d2f34;
            background: #1e1f22;
            color: white;
            font-size: 14px;
            outline: none;
        }

        .search-input:focus {
            border-color: #5865f2;
        }

        .search-btn {
            padding: 10px 18px;
            border-radius: 24px;
            border: none;
            background: #5865f2;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .search-btn:hover {
            opacity: 0.8;
        }

        /* Вкладки */
        .tabs {
            display: flex;
            background: #111214;
            border-bottom: 1px solid #2d2f34;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: none;
            border: none;
            color: #8e9297;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .tab-btn:hover {
            color: #b5bac1;
        }

        .tab-btn.active {
            color: #5865f2;
            border-bottom: 2px solid #5865f2;
        }

        /* Списки */
        .lists-container {
            flex: 1;
            overflow-y: auto;
            background: #111214;
        }

        .list-panel {
            display: none;
            height: 100%;
            overflow-y: auto;
        }

        .list-panel.active {
            display: block;
        }

        .list-item {
            padding: 14px 16px;
            border-bottom: 1px solid #2d2f34;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .list-item:hover {
            background: #2b2d33;
        }

        .list-item.active {
            background: #2b2d33;
        }

        .list-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #5865f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
        }

        .list-info {
            flex: 1;
        }

        .list-name {
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .list-type {
            font-size: 11px;
            color: #8e9297;
        }

        .delete-item {
            background: #ed4245;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .delete-item:hover {
            opacity: 0.8;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #8e9297;
        }

        /* Кнопки действий внизу списков */
        .action-footer {
            padding: 16px;
            border-top: 1px solid #2d2f34;
            margin-top: 10px;
        }

        .action-footer button {
            width: 100%;
            padding: 12px;
            border-radius: 24px;
            border: none;
            background: #2c2f36;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-footer button:hover {
            background: #3a3f47;
        }

        .action-footer button:first-child {
            margin-bottom: 8px;
        }

        /* ==================== ЧАТ ==================== */
        .chat-header {
            background: #1e1f22;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2d2f34;
            flex-shrink: 0;
        }

        .back-btn {
            background: #2c2f36;
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: none;
        }

        @media (max-width: 768px) {
            .back-btn {
                display: flex;
                align-items: center;
                justify-content: center;
            }
        }

        .chat-title {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 18px;
            background: #1e1f22;
            align-self: flex-start;
            position: relative;
        }

        .message.own {
            background: #5865f2;
            align-self: flex-end;
        }

        .msg-sender {
            font-size: 11px;
            margin-bottom: 4px;
            color: #b5bac1;
        }

        .msg-text {
            font-size: 14px;
            word-break: break-word;
            line-height: 1.4;
        }

        .msg-time {
            font-size: 10px;
            color: #8e9297;
            text-align: right;
            margin-top: 4px;
        }

        .delete-msg-btn {
            background: #ed4245;
            border: none;
            color: white;
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 10px;
            transition: opacity 0.2s;
        }

        .delete-msg-btn:hover {
            opacity: 0.8;
        }

        .input-area {
            background: #1e1f22;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #2d2f34;
            flex-shrink: 0;
        }

        .msg-input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #2d2f34;
            background: #111214;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .msg-input:focus {
            border-color: #5865f2;
        }

        .send-msg-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #5865f2;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-msg-btn:hover {
            opacity: 0.8;
        }

        /* ==================== УВЕДОМЛЕНИЯ ==================== */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #ed4245;
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            animation: slideUp 0.2s ease;
        }

        .toast.success {
            background: #57f287;
            color: #0a0c10;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ==================== МОДАЛЬНЫЕ ОКНА ==================== */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: #1e1f22;
            border-radius: 24px;
            padding: 28px;
            width: 90%;
            max-width: 380px;
        }

        .modal-content h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px 14px;
            margin: 16px 0;
            border-radius: 12px;
            border: 1px solid #2d2f34;
            background: #111214;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .modal-content input:focus {
            border-color: #5865f2;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .modal-buttons button:hover {
            opacity: 0.8;
        }

        /* ==================== АВТОРИЗАЦИЯ ==================== */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0c10, #1a1d24);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .auth-box {
            background: #1e1f22;
            border-radius: 28px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
        }

        .auth-box h1 {
            text-align: center;
            margin-bottom: 32px;
            font-size: 36px;
            background: linear-gradient(135deg, #5865f2, #8b9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-box input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-radius: 14px;
            border: 1px solid #2d2f34;
            background: #111214;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .auth-box input:focus {
            border-color: #5865f2;
        }

        .auth-box button {
            width: 100%;
            padding: 14px;
            margin-top: 8px;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .auth-box button:hover {
            opacity: 0.8;
        }

        .btn-primary {
            background: #5865f2;
            color: white;
        }

        .btn-secondary {
            background: #2c2f36;
            color: white;
        }

        .auth-msg {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            color: #ed4245;
            min-height: 40px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Экран авторизации -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-box">
            <h1>Zing</h1>
            <input type="text" id="loginName" placeholder="Имя пользователя" autocomplete="off">
            <input type="password" id="loginPass" placeholder="Пароль (6+ символов)" autocomplete="off">
            <button class="btn-primary" id="loginBtn">Войти</button>
            <button class="btn-secondary" id="registerBtn">Создать аккаунт</button>
            <div id="authMsg" class="auth-msg"></div>
        </div>
    </div>

    <!-- ПК/Мобильный интерфейс (две панели) -->
    <div id="appLayout" class="pc-layout hidden">
        <!-- Левая панель - контакты -->
        <div class="contacts-sidebar" id="contactsSidebar">
            <div class="header">
                <div class="user-info">
                    <div class="avatar" id="avatar">U</div>
                    <div class="user-details">
                        <div class="user-name" id="userName">Загрузка...</div>
                        <div class="user-id-text" id="userId">ID: ---</div>
                    </div>
                </div>
                <div class="header-buttons">
                    <button class="small-btn" id="editProfileBtn">Ред.</button>
                    <button class="small-btn" id="logoutBtn">Выйти</button>
                </div>
            </div>

            <div class="search-section">
                <div class="search-row">
                    <input type="text" id="searchId" class="search-input" placeholder="Поиск по 6-значному ID" autocomplete="off">
                    <button class="search-btn" id="findUserBtn">Найти</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" data-tab="chats">Чаты</button>
                <button class="tab-btn" data-tab="groups">Группы</button>
                <button class="tab-btn" data-tab="channels">Каналы</button>
            </div>

            <div class="lists-container">
                <!-- Чаты -->
                <div id="chatsPanel" class="list-panel active">
                    <div class="empty-state">Нет чатов<br>Найдите пользователя по ID</div>
                </div>
                
                <!-- Группы -->
                <div id="groupsPanel" class="list-panel">
                    <div class="empty-state">Нет групп<br>Создайте группу</div>
                    <div class="action-footer">
                        <button id="createGroupFooterBtn">Создать группу</button>
                    </div>
                </div>
                
                <!-- Каналы -->
                <div id="channelsPanel" class="list-panel">
                    <div class="empty-state">Нет каналов<br>Создайте или вступите в канал</div>
                    <div class="action-footer">
                        <button id="createChannelFooterBtn">Создать канал</button>
                        <button id="findChannelFooterBtn">Найти канал по названию</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Правая панель - чат -->
        <div class="chat-main">
            <div class="chat-header">
                <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                <button class="back-btn" id="closeChatBtn">←</button>
                <div class="chat-title" id="chatName">Выберите чат</div>
            </div>
            <div class="messages-area" id="messagesList">
                <div class="empty-state">Выберите чат из списка слева</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageText" class="msg-input" placeholder="Сообщение..." disabled>
                <button class="send-msg-btn" id="sendMsgBtn" disabled>➤</button>
            </div>
        </div>
    </div>

    <script>
        // Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAw6OFQXNHbNkzkjciUGRTZwtFHKaCLLBQ",
            authDomain: "zinger-980b6.firebaseapp.com",
            projectId: "zinger-980b6",
            storageBucket: "zinger-980b6.firebasestorage.app",
            messagingSenderId: "735904052048",
            appId: "1:735904052048:web:66d61bb87a1336ef737255"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const rtdb = firebase.database();

        let currentUser = null;
        let currentUserData = null;
        let currentChat = null;
        let currentMessagesRef = null;

        function showToast(msg, isSuccess = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isSuccess ? ' success' : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function genId() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function formatTime(ts) {
            return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        // Регистрация
        async function register(username, password) {
            const email = `${username}_${Date.now()}@z.local`;
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            const sixId = genId();
            await db.collection('users').doc(cred.user.uid).set({
                uid: cred.user.uid,
                username: username,
                displayName: username,
                sixDigitId: sixId,
                email: email,
                createdAt: Date.now(),
                dialogs: []
            });
            await cred.user.updateProfile({ displayName: username });
            showToast(`Аккаунт создан! Ваш ID: ${sixId}`, true);
            return cred.user;
        }

        // Вход
        async function login(username, password) {
            const snap = await db.collection('users').where('username', '==', username).limit(1).get();
            if (snap.empty) throw new Error('Пользователь не найден');
            const userData = snap.docs[0].data();
            await auth.signInWithEmailAndPassword(userData.email, password);
            showToast(`Добро пожаловать, ${username}!`, true);
        }

        // Загрузка профиля
        async function loadProfile() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                currentUserData = doc.data();
                document.getElementById('userName').textContent = currentUserData.displayName;
                document.getElementById('userId').innerHTML = `ID: ${currentUserData.sixDigitId}`;
                document.getElementById('avatar').textContent = (currentUserData.displayName?.[0] || 'U').toUpperCase();
            }
        }

        // Поиск пользователя
        async function findUser(id) {
            if (!/^\d{6}$/.test(id)) throw new Error('ID должен быть 6 цифр');
            const snap = await db.collection('users').where('sixDigitId', '==', id).limit(1).get();
            if (snap.empty) return null;
            return snap.docs[0].data();
        }

        // Поиск канала по названию
        async function findChannelByName(name) {
            if (!name?.trim()) throw new Error('Введите название');
            const snap = await db.collection('channels').where('name', '==', name.trim()).get();
            const results = [];
            snap.forEach(doc => results.push({ id: doc.id, ...doc.data() }));
            return results;
        }

        // Вступление в канал
        async function joinChannel(channelId, channelName) {
            const doc = await db.collection('channels').doc(channelId).get();
            if (!doc.exists) throw new Error('Канал не найден');
            const members = doc.data().members || [];
            if (members.includes(currentUser.uid)) throw new Error('Вы уже участник');
            members.push(currentUser.uid);
            await db.collection('channels').doc(channelId).update({ members });
            const userRef = db.collection('users').doc(currentUser.uid);
            const userDoc = await userRef.get();
            let dialogs = userDoc.data()?.dialogs || [];
            if (!dialogs.some(d => d.chatId === channelId)) {
                dialogs.push({ type: 'channel', chatId: channelId, name: channelName || doc.data().name, updatedAt: Date.now() });
                await userRef.update({ dialogs });
            }
            showToast(`Вступили в "${channelName || doc.data().name}"!`, true);
            loadDialogs();
        }

        // Создание чата
        async function createDM(targetId) {
            const target = await findUser(targetId);
            if (!target) throw new Error('Пользователь не найден');
            if (target.uid === currentUser.uid) throw new Error('Нельзя с собой');
            
            const chatId = [currentUser.uid, target.uid].sort().join('_');
            const userRef = db.collection('users').doc(currentUser.uid);
            const userDoc = await userRef.get();
            let dialogs = userDoc.data()?.dialogs || [];
            
            if (!dialogs.some(d => d.chatId === chatId)) {
                dialogs.push({
                    type: 'dm',
                    chatId: chatId,
                    name: target.displayName,
                    targetId: target.uid,
                    updatedAt: Date.now()
                });
                await userRef.update({ dialogs });
            }
            
            const targetRef = db.collection('users').doc(target.uid);
            const targetDoc = await targetRef.get();
            let tDialogs = targetDoc.data()?.dialogs || [];
            if (!tDialogs.some(d => d.chatId === chatId)) {
                tDialogs.push({
                    type: 'dm',
                    chatId: chatId,
                    name: currentUserData.displayName,
                    targetId: currentUser.uid,
                    updatedAt: Date.now()
                });
                await targetRef.update({ dialogs: tDialogs });
            }
            
            return { chatId, name: target.displayName };
        }

        // Удаление диалога
        async function deleteDialog(chatId, type) {
            const userRef = db.collection('users').doc(currentUser.uid);
            const userDoc = await userRef.get();
            let dialogs = userDoc.data()?.dialogs || [];
            dialogs = dialogs.filter(d => !(d.chatId === chatId && d.type === type));
            await userRef.update({ dialogs });
            loadDialogs();
            if (currentChat && currentChat.id === chatId) {
                closeChat();
            }
        }

        // Загрузка диалогов
        async function loadDialogs() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            const dialogs = doc.data()?.dialogs || [];
            
            const dms = dialogs.filter(d => d.type === 'dm');
            const groups = dialogs.filter(d => d.type === 'group');
            const channels = dialogs.filter(d => d.type === 'channel');
            
            // Чаты
            const chatsPanel = document.getElementById('chatsPanel');
            chatsPanel.innerHTML = '';
            if (dms.length === 0) {
                chatsPanel.innerHTML = '<div class="empty-state">Нет чатов<br>Найдите пользователя по ID</div>';
            } else {
                for (const dm of dms) {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    if (currentChat && currentChat.id === dm.chatId && currentChat.type === 'dm') {
                        div.classList.add('active');
                    }
                    div.innerHTML = `
                        <div class="list-avatar">${dm.name[0]?.toUpperCase() || '?'}</div>
                        <div class="list-info">
                            <div class="list-name">${escapeHtml(dm.name)}</div>
                            <div class="list-type">Личный чат</div>
                        </div>
                        <button class="delete-item" data-id="${dm.chatId}" data-type="dm">Удалить</button>
                    `;
                    const deleteBtn = div.querySelector('.delete-item');
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteDialog(dm.chatId, 'dm');
                    };
                    div.onclick = (e) => {
                        if (e.target !== deleteBtn) {
                            openChat({ type: 'dm', id: dm.chatId, name: dm.name });
                            if (window.innerWidth <= 768) {
                                document.getElementById('contactsSidebar').classList.remove('open');
                            }
                        }
                    };
                    chatsPanel.appendChild(div);
                }
            }
            
            // Группы
            const groupsPanel = document.getElementById('groupsPanel');
            groupsPanel.innerHTML = '';
            if (groups.length === 0) {
                groupsPanel.innerHTML = '<div class="empty-state">Нет групп<br>Создайте группу</div>';
            } else {
                for (const group of groups) {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    if (currentChat && currentChat.id === group.chatId && currentChat.type === 'group') {
                        div.classList.add('active');
                    }
                    div.innerHTML = `
                        <div class="list-avatar">${group.name[0]?.toUpperCase() || 'G'}</div>
                        <div class="list-info">
                            <div class="list-name">${escapeHtml(group.name)}</div>
                            <div class="list-type">Группа</div>
                        </div>
                        <button class="delete-item" data-id="${group.chatId}" data-type="group">Удалить</button>
                    `;
                    const deleteBtn = div.querySelector('.delete-item');
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteDialog(group.chatId, 'group');
                    };
                    div.onclick = (e) => {
                        if (e.target !== deleteBtn) {
                            openChat({ type: 'group', id: group.chatId, name: group.name });
                            if (window.innerWidth <= 768) {
                                document.getElementById('contactsSidebar').classList.remove('open');
                            }
                        }
                    };
                    groupsPanel.appendChild(div);
                }
            }
            groupsPanel.innerHTML += '<div class="action-footer"><button id="createGroupFooterBtn">Создать группу</button></div>';
            document.getElementById('createGroupFooterBtn')?.addEventListener('click', () => showCreateGroupModal());
            
            // Каналы
            const channelsPanel = document.getElementById('channelsPanel');
            channelsPanel.innerHTML = '';
            if (channels.length === 0) {
                channelsPanel.innerHTML = '<div class="empty-state">Нет каналов<br>Создайте или вступите в канал</div>';
            } else {
                for (const channel of channels) {
                    const div = document.createElement('div');
                    div.className = 'list-item';
                    if (currentChat && currentChat.id === channel.chatId && currentChat.type === 'channel') {
                        div.classList.add('active');
                    }
                    div.innerHTML = `
                        <div class="list-avatar">${channel.name[0]?.toUpperCase() || 'C'}</div>
                        <div class="list-info">
                            <div class="list-name">${escapeHtml(channel.name)}</div>
                            <div class="list-type">Канал</div>
                        </div>
                        <button class="delete-item" data-id="${channel.chatId}" data-type="channel">Удалить</button>
                    `;
                    const deleteBtn = div.querySelector('.delete-item');
                    deleteBtn.onclick = (e) => {
                        e.stopPropagation();
                        deleteDialog(channel.chatId, 'channel');
                    };
                    div.onclick = (e) => {
                        if (e.target !== deleteBtn) {
                            openChat({ type: 'channel', id: channel.chatId, name: channel.name });
                            if (window.innerWidth <= 768) {
                                document.getElementById('contactsSidebar').classList.remove('open');
                            }
                        }
                    };
                    channelsPanel.appendChild(div);
                }
            }
            channelsPanel.innerHTML += '<div class="action-footer"><button id="createChannelFooterBtn">Создать канал</button><button id="findChannelFooterBtn">Найти канал по названию</button></div>';
            document.getElementById('createChannelFooterBtn')?.addEventListener('click', () => showCreateChannelModal());
            document.getElementById('findChannelFooterBtn')?.addEventListener('click', () => searchAndJoinChannel());
        }

        // Открыть чат
        function openChat(chat) {
            if (currentMessagesRef) currentMessagesRef.off();
            currentChat = chat;
            document.getElementById('chatName').textContent = chat.name;
            document.getElementById('messageText').disabled = false;
            document.getElementById('sendMsgBtn').disabled = false;
            
            let path;
            if (chat.type === 'dm') path = `messages/dm/${chat.id}`;
            else if (chat.type === 'group') path = `messages/groups/${chat.id}`;
            else path = `messages/channels/${chat.id}`;
            
            const messagesDiv = document.getElementById('messagesList');
            messagesDiv.innerHTML = '<div class="empty-state">Загрузка...</div>';
            
            currentMessagesRef = rtdb.ref(path);
            currentMessagesRef.on('value', (snap) => {
                const msgs = snap.val() || {};
                messagesDiv.innerHTML = '';
                const sorted = Object.entries(msgs).sort((a, b) => a[1].timestamp - b[1].timestamp);
                if (sorted.length === 0) {
                    messagesDiv.innerHTML = '<div class="empty-state">Нет сообщений</div>';
                    return;
                }
                let lastSender = null;
                for (const [msgId, msg] of sorted) {
                    const isOwn = msg.senderId === currentUser.uid;
                    const msgDiv = document.createElement('div');
                    msgDiv.className = `message ${isOwn ? 'own' : ''}`;
                    let senderHtml = '';
                    if (!isOwn && lastSender !== msg.senderId) {
                        senderHtml = `<div class="msg-sender">${escapeHtml(msg.senderName)}</div>`;
                    }
                    msgDiv.innerHTML = `
                        ${senderHtml}
                        <div class="msg-text">${escapeHtml(msg.text)}</div>
                        <div class="msg-time">${formatTime(msg.timestamp)}</div>
                        <button class="delete-msg-btn" data-id="${msgId}">Удалить</button>
                    `;
                    const delBtn = msgDiv.querySelector('.delete-msg-btn');
                    delBtn.onclick = () => {
                        rtdb.ref(`${path}/${msgId}`).remove();
                    };
                    messagesDiv.appendChild(msgDiv);
                    lastSender = isOwn ? null : msg.senderId;
                }
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
            
            document.getElementById('messageText').value = '';
            loadDialogs();
        }

        // Закрыть чат
        function closeChat() {
            if (currentMessagesRef) currentMessagesRef.off();
            currentChat = null;
            document.getElementById('chatName').textContent = 'Выберите чат';
            document.getElementById('messagesList').innerHTML = '<div class="empty-state">Выберите чат из списка слева</div>';
            document.getElementById('messageText').disabled = true;
            document.getElementById('sendMsgBtn').disabled = true;
            loadDialogs();
        }

        // Отправить сообщение
        async function sendMsg() {
            const input = document.getElementById('messageText');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            const msg = {
                text: text,
                senderId: currentUser.uid,
                senderName: currentUserData.displayName,
                timestamp: Date.now()
            };
            
            let path;
            if (currentChat.type === 'dm') path = `messages/dm/${currentChat.id}`;
            else if (currentChat.type === 'group') path = `messages/groups/${currentChat.id}`;
            else path = `messages/channels/${currentChat.id}`;
            
            await rtdb.ref(path).push().set(msg);
            input.value = '';
        }

        // Создание группы
        async function createGroup(name, members) {
            const groupId = `group_${Date.now()}_${Math.random().toString(36).substr(2, 4)}`;
            const memberIds = [currentUser.uid];
            for (const id of members) {
                const user = await findUser(id);
                if (user) memberIds.push(user.uid);
            }
            await db.collection('groups').doc(groupId).set({
                name: name,
                ownerId: currentUser.uid,
                members: memberIds,
                createdAt: Date.now()
            });
            for (const uid of memberIds) {
                const ref = db.collection('users').doc(uid);
                const doc = await ref.get();
                let dialogs = doc.data()?.dialogs || [];
                if (!dialogs.some(d => d.chatId === groupId)) {
                    dialogs.push({ type: 'group', chatId: groupId, name: name, updatedAt: Date.now() });
                    await ref.update({ dialogs });
                }
            }
            showToast(`Группа "${name}" создана!`, true);
            loadDialogs();
        }

        // Создание канала
        async function createChannel(name) {
            const channelId = `channel_${Date.now()}_${Math.random().toString(36).substr(2, 4)}`;
            await db.collection('channels').doc(channelId).set({
                name: name,
                ownerId: currentUser.uid,
                members: [currentUser.uid],
                createdAt: Date.now()
            });
            const ref = db.collection('users').doc(currentUser.uid);
            const doc = await ref.get();
            let dialogs = doc.data()?.dialogs || [];
            dialogs.push({ type: 'channel', chatId: channelId, name: name, updatedAt: Date.now() });
            await ref.update({ dialogs });
            showToast(`Канал "${name}" создан!`, true);
            loadDialogs();
        }

        // Обновление имени
        async function updateName(newName) {
            if (!newName?.trim()) return;
            await db.collection('users').doc(currentUser.uid).update({
                displayName: newName.trim(),
                username: newName.trim()
            });
            await currentUser.updateProfile({ displayName: newName.trim() });
            await loadProfile();
            showToast('Имя обновлено!', true);
        }

        // Модальное окно
        function showModal(title, placeholder, callback, secondPlaceholder = null) {
            const modal = document.createElement('div');
            modal.className = 'modal';
            let inputs = `<input type="text" id="modalInput1" placeholder="${placeholder}" autocomplete="off">`;
            if (secondPlaceholder) {
                inputs += `<input type="text" id="modalInput2" placeholder="${secondPlaceholder}" style="margin-top: 8px;" autocomplete="off">`;
            }
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>${title}</h3>
                    ${inputs}
                    <div class="modal-buttons">
                        <button class="btn-secondary" id="modalCancel">Отмена</button>
                        <button class="btn-primary" id="modalOk">ОК</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('modalCancel').onclick = () => modal.remove();
            document.getElementById('modalOk').onclick = () => {
                const val1 = document.getElementById('modalInput1').value;
                const val2 = secondPlaceholder ? document.getElementById('modalInput2').value : null;
                callback(val1, val2);
                modal.remove();
            };
        }

        // Модалка создания группы
        function showCreateGroupModal() {
            showModal('Создание группы', 'Название группы', (name) => {
                if (!name) return;
                showModal('Участники группы', 'ID через запятую (необязательно)', (membersStr) => {
                    const members = membersStr ? membersStr.split(',').map(m => m.trim()).filter(m => m) : [];
                    createGroup(name, members);
                });
            });
        }

        // Модалка создания канала
        function showCreateChannelModal() {
            showModal('Создание канала', 'Название канала', (name) => {
                if (name) createChannel(name);
            });
        }

        // Поиск канала и вступление
        async function searchAndJoinChannel() {
            showModal('Поиск канала', 'Название канала', async (name) => {
                if (!name) return;
                try {
                    const channels = await findChannelByName(name);
                    if (!channels || channels.length === 0) {
                        showToast('Каналы не найдены');
                        return;
                    }
                    if (channels.length === 1) {
                        await joinChannel(channels[0].id, channels[0].name);
                    } else {
                        showToast(`Найдено ${channels.length} каналов. Вступите через список.`);
                    }
                } catch(e) {
                    showToast(e.message);
                }
            });
        }

        // Аутентификация
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadProfile();
                await loadDialogs();
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appLayout').classList.remove('hidden');
            } else {
                currentUser = null;
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appLayout').classList.add('hidden');
            }
        });

        // Обработчики
        document.getElementById('loginBtn').onclick = async () => {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value;
            try {
                await login(name, pass);
                document.getElementById('authMsg').textContent = '';
            } catch(e) {
                document.getElementById('authMsg').textContent = e.message;
            }
        };
        
        document.getElementById('registerBtn').onclick = async () => {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (pass.length < 6) {
                document.getElementById('authMsg').textContent = 'Пароль минимум 6 символов';
                return;
            }
            try {
                await register(name, pass);
                document.getElementById('authMsg').textContent = '';
            } catch(e) {
                document.getElementById('authMsg').textContent = e.message;
            }
        };
        
        document.getElementById('logoutBtn').onclick = () => auth.signOut();
        document.getElementById('editProfileBtn').onclick = () => {
            showModal('Редактирование', 'Новое имя', updateName);
        };
        
        document.getElementById('findUserBtn').onclick = async () => {
            const id = document.getElementById('searchId').value.trim();
            if (!id) {
                showToast('Введите ID');
                return;
            }
            try {
                const dm = await createDM(id);
                await loadDialogs();
                openChat({ type: 'dm', id: dm.chatId, name: dm.name });
                document.getElementById('searchId').value = '';
            } catch(e) {
                showToast(e.message);
            }
        };
        
        document.getElementById('closeChatBtn').onclick = closeChat;
        document.getElementById('sendMsgBtn').onclick = sendMsg;
        document.getElementById('messageText').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
        
        // Мобильное меню
        const menuBtn = document.getElementById('mobileMenuBtn');
        const sidebar = document.getElementById('contactsSidebar');
        if (menuBtn) {
            menuBtn.onclick = () => {
                sidebar.classList.toggle('open');
            };
        }
        
        // Табы
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.list-panel').forEach(p => p.classList.remove('active'));
                const tab = btn.getAttribute('data-tab');
                if (tab === 'chats') document.getElementById('chatsPanel').classList.add('active');
                if (tab === 'groups') document.getElementById('groupsPanel').classList.add('active');
                if (tab === 'channels') document.getElementById('channelsPanel').classList.add('active');
            };
        });
        
        // Закрыть меню при клике вне его на мобильных
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(e.target) && e.target !== menuBtn && sidebar.classList.contains('open')) {
                    sidebar.classList.remove('open');
                }
            }
        });
    </script>
</body>
</html>
